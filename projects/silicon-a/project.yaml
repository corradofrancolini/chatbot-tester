project:
  name: silicon-a
  description: Chatbot Silicon Search A (app-silicon-search-2)
  created: '2025-12-12'
  language: it

chatbot:
  url: https://platform-ai-dev.ws-deploy-01.wslabs.it/api/llm/app-silicon-search-2/it
  selectors:
    textarea: '#llm-prompt-textarea'
    submit_button: button.llm__prompt-submit
    bot_messages: .llm__message--assistant
    thread_container: .llm__scroller
    loading_indicator: .llm__busyIndicator
  screenshot_css: ''
  timeouts:
    page_load: 30000
    bot_response: 60000

test_defaults:
  email: test@example.com
  countries:
    - Italy
    - Germany
    - France
  confirmations:
    - 'yes'
    - 'no'

google_sheets:
  enabled: true
  credentials_path: "config/oauth_credentials.json"
  spreadsheet_id: '1ei94Ef829fRALQ-hCGrtgCDx_Lio-2dkS_lphvGU4yw'
  drive_folder_id: '1cFjBgVRsdkpqOldF69Zwe481WkRNmWv5'

langsmith:
  enabled: true
  api_key_env: LANGSMITH_API_KEY
  project_id: '66731532-4fb2-4f02-b67e-9c175a5a482c'
  org_id: ''
  tool_names: []

ollama:
  enabled: true
  model: llama3.2:3b
  url: http://localhost:11434/api/generate
